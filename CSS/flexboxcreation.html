<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlexBox</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body{
            height: 100vh;
            background-color: blue;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }
        .container{
            height: 100vh;
            padding: 5px;
            margin: 10px;
            text-align: center;
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: flex-end;
            flex-wrap: wrap;
        }
        .box1{
            background-color: brown;
             height: 100px;
            width: 100px;
            margin-bottom: 10px;
        }
        .box2{
            background-color: brown;
            height: 100px;
            width: 100px;
            margin-bottom: 10px;
        }
        .box3{
            background-color: brown;
            height: 100px;
            width: 100px;
            margin-bottom: 10px;
        }
        .box4{
            background-color: brown;
            height: 100px;
            width: 100px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box1">1</div>
        <div class="box2">2</div>
        <div class="box3">3</div>
        <div class="box4">4</div>
        <div class="box4">5</div>
        <div class="box4">6</div>
        <div class="box4">7</div>
        <div class="box4">8</div>
        <div class="box4">9</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
        <div class="box4">10</div>
    </div>
</body>
</html>
