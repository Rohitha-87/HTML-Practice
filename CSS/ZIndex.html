<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>z-index</title>
    <style>
        body{
            background-color: blue;
            height: 100vh;
        }
        .box{
            height: 150px;
            width: 150px;
            margin: 10px;
            padding: 10px;
            border-radius: 15px;
            position: absolute;
        }
        .box-1{
            background-color: blueviolet;
            z-index: 6;
            margin:20px;
            left:30px;
        }
        .box-2{
            background-color: brown;
            z-index: 9;
            top:40px;
        }
        .box-3{
            background-color: aqua;
            z-index: 4;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box box-1"></div>
        <div class="box box-2"></div>
        <div class="box box-3"></div>
    </div>
</body>
</html>
